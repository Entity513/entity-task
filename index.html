<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E0D0B">
<title>Entity Task | Re:Poker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
<style>
.flatpickr-calendar {
  background: #1E1A14 !important;
  border: 1px solid rgba(255,255,255,0.1) !important;
  border-radius: 12px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
}
.flatpickr-day {
  color: #F0EDE6 !important;
  border-radius: 6px !important;
}
.flatpickr-day:hover { background: rgba(232,197,71,0.15) !important; }
.flatpickr-day.selected, .flatpickr-day.selected:hover {
  background: #E8C547 !important;
  border-color: #E8C547 !important;
  color: #0A0908 !important;
}
.flatpickr-day.today { border-color: rgba(232,197,71,0.4) !important; }
.flatpickr-months { background: #181510 !important; border-radius: 12px 12px 0 0 !important; }
.flatpickr-month, .flatpickr-weekday { color: #B8B3A8 !important; fill: #B8B3A8 !important; }
.flatpickr-prev-month, .flatpickr-next-month { fill: #B8B3A8 !important; }
.flatpickr-prev-month:hover svg, .flatpickr-next-month:hover svg { fill: #E8C547 !important; }
.numInputWrapper span { border-color: rgba(255,255,255,0.1) !important; }
.numInputWrapper span:hover { background: rgba(255,255,255,0.05) !important; }
.flatpickr-day.flatpickr-disabled { color: rgba(255,255,255,0.2) !important; }
</style>
<style>
:root {
  --bg:    #0A0908;
  --bg2:   #111009;
  --bg3:   #181510;
  --bg4:   #1E1A14;
  --text:  #F0EDE6;
  --muted: #8A857C;
  --muted2:#B8B3A8;
  --gold:  #E8C547;
  --green: #47E8A0;
  --blue:  #47A0E8;
  --orange:#E87047;
  --purple:#A047E8;
  --red:   #E84747;
  --teal:  #47E8D4;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{height:100%;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Hiragino Kaku Gothic Pro','Yu Gothic','Helvetica Neue',sans-serif;
  height:100%;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  min-width:220px;
  background:var(--bg2);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow-y:auto;
}
.sidebar-logo{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--border);
}
.logo-main{
  font-size:15px;
  font-weight:900;
  color:var(--gold);
  letter-spacing:0.05em;
}
.logo-sub{
  font-size:9px;
  color:var(--muted);
  letter-spacing:0.2em;
  margin-top:2px;
}
.sidebar-section{
  padding:16px 12px 8px;
  font-size:9px;
  color:var(--muted);
  letter-spacing:0.2em;
  text-transform:uppercase;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 16px;
  font-size:13px;
  color:var(--muted2);
  cursor:pointer;
  border-radius:6px;
  margin:1px 8px;
  transition:all 0.15s;
  text-decoration:none;
}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.nav-item.active{background:rgba(232,197,71,0.1);color:var(--gold);}
.nav-item .icon{font-size:14px;width:18px;text-align:center;}
.staff-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 16px;
  font-size:12px;
  color:var(--muted2);
  cursor:pointer;
  border-radius:6px;
  margin:1px 8px;
  transition:all 0.15s;
}
.staff-item:hover{background:rgba(255,255,255,0.04);color:var(--text);}
.staff-item.active{background:rgba(255,255,255,0.06);color:var(--text);}
.staff-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.staff-avatar-sm {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.staff-avatar-lg {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
}
.staff-count{
  margin-left:auto;
  font-size:10px;
  color:var(--muted);
  background:rgba(255,255,255,0.06);
  padding:1px 6px;
  border-radius:10px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  gap:16px;
  padding:0 24px;
  height:56px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  flex-shrink:0;
}
.topbar-title{
  font-size:15px;
  font-weight:700;
  flex:1;
}
.topbar-actions{display:flex;gap:8px;}
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;
  border-radius:7px;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border:none;
  transition:all 0.15s;
  letter-spacing:0.02em;
}
.btn-primary{background:var(--gold);color:#0A0908;}
.btn-primary:hover{opacity:0.9;}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--muted2);border:1px solid var(--border);}
.btn-ghost:hover{background:rgba(255,255,255,0.08);color:var(--text);}

/* FILTER BAR */
.filterbar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 24px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:wrap;
}
.filter-btn{
  padding:4px 12px;
  border-radius:20px;
  font-size:11px;
  cursor:pointer;
  border:1px solid var(--border);
  color:var(--muted);
  background:transparent;
  transition:all 0.15s;
}
.filter-btn:hover,.filter-btn.active{
  border-color:var(--gold);
  color:var(--gold);
  background:rgba(232,197,71,0.08);
}
.filter-sep{width:1px;height:16px;background:var(--border);}

/* CONTENT */
.content{
  flex:1;
  overflow-y:auto;
  padding:24px;
}

/* DASHBOARD */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  margin-bottom:28px;
}
.stat-card{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px;
}
.stat-label{font-size:10px;color:var(--muted);letter-spacing:0.12em;margin-bottom:8px;}
.stat-val{font-size:28px;font-weight:900;line-height:1;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* SECTION */
.section-title{
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.15em;
  text-transform:uppercase;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:10px;
}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:6px;margin-bottom:28px;}
.task-item{
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px 16px;
  cursor:pointer;
  transition:all 0.15s;
}
.task-item:hover{border-color:var(--border2);background:var(--bg4);}
.task-check{
  width:18px;height:18px;
  border-radius:5px;
  border:1.5px solid var(--border2);
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all 0.15s;
}
.task-check.done{
  background:var(--green);
  border-color:var(--green);
  color:#0A0908;
  font-size:11px;
}
.task-check:hover{border-color:var(--green);}
.task-title{flex:1;font-size:13px;}
.task-title.done{text-decoration:line-through;color:var(--muted);}
.task-meta{
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.badge{
  font-size:9px;
  padding:2px 8px;
  border-radius:20px;
  font-weight:700;
  letter-spacing:0.05em;
}
.badge-todo{background:rgba(255,255,255,0.06);color:var(--muted);}
.badge-in_progress{background:rgba(71,160,232,0.15);color:var(--blue);border:1px solid rgba(71,160,232,0.3);}
.badge-done{background:rgba(71,232,160,0.12);color:var(--green);border:1px solid rgba(71,232,160,0.25);}
.badge-on_hold{background:rgba(232,112,71,0.12);color:var(--orange);border:1px solid rgba(232,112,71,0.25);}
.badge-urgent{background:rgba(232,71,71,0.15);color:var(--red);border:1px solid rgba(232,71,71,0.3);}
.badge-high{background:rgba(232,112,71,0.12);color:var(--orange);}
.badge-medium{background:rgba(232,197,71,0.1);color:var(--gold);}
.badge-low{background:rgba(255,255,255,0.05);color:var(--muted);}

.task-staff{
  display:flex;align-items:center;gap:5px;
  font-size:11px;color:var(--muted);
}
.task-staff-dot{width:6px;height:6px;border-radius:50%;}
.task-hours{font-size:11px;color:var(--muted);}
.task-due{font-size:11px;}
.task-due.overdue{color:var(--red);}
.task-due.today{color:var(--gold);}
.task-due.ok{color:var(--muted);}

/* STAFF GRID */
.staff-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px;
}
.staff-card{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px;
  cursor:pointer;
  transition:all 0.15s;
}
.staff-card:hover{border-color:var(--border2);transform:translateY(-2px);}
.staff-card-top{
  display:flex;align-items:center;gap:12px;margin-bottom:16px;
}
.staff-avatar{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;
  flex-shrink:0;
}
.staff-info h3{font-size:14px;font-weight:700;margin-bottom:2px;}
.staff-info p{font-size:11px;color:var(--muted);}
.staff-stats{
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
}
.staff-stat{text-align:center;}
.staff-stat-val{font-size:18px;font-weight:800;}
.staff-stat-label{font-size:9px;color:var(--muted);letter-spacing:0.08em;}
.progress-wrap{margin-top:12px;}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--muted);margin-bottom:4px;
}
.progress-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;transition:width 0.4s;}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  z-index:1000;
  padding:20px;
}
.modal{
  background:var(--bg3);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:28px;
  width:100%;
  max-width:520px;
  max-height:90vh;
  overflow-y:auto;
}
.modal h2{
  font-size:18px;font-weight:800;margin-bottom:20px;
  display:flex;align-items:center;gap:10px;
}
.form-group{margin-bottom:16px;}
.form-label{
  font-size:11px;color:var(--muted);letter-spacing:0.1em;
  text-transform:uppercase;margin-bottom:6px;display:block;
}
.form-input,.form-select,.form-textarea{
  width:100%;
  background:var(--bg2);
  border:1px solid var(--border2);
  color:var(--text);
  border-radius:8px;
  padding:10px 14px;
  font-size:13px;
  font-family:inherit;
  outline:none;
  transition:border-color 0.15s;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{
  border-color:rgba(232,197,71,0.5);
}
.form-select option{background:var(--bg2);}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{
  display:flex;gap:10px;margin-top:24px;justify-content:flex-end;
}

/* TOAST */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--bg4);
  border:1px solid var(--border2);
  border-radius:10px;
  padding:14px 20px;
  font-size:13px;
  z-index:2000;
  transform:translateY(80px);
  opacity:0;
  transition:all 0.3s;
  display:flex;align-items:center;gap:10px;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-left:3px solid var(--green);}
.toast.error{border-left:3px solid var(--red);}

/* EMPTY */
.empty{
  text-align:center;padding:60px 20px;color:var(--muted);
}
.empty-icon{font-size:40px;margin-bottom:12px;}
.empty p{font-size:13px;}

/* DETAIL PANEL */
.detail-panel{
  width:360px;min-width:360px;
  background:var(--bg2);
  border-left:1px solid var(--border);
  height:100vh;
  overflow-y:auto;
  padding:24px;
}
.detail-panel.hidden{display:none;}
.detail-close{
  float:right;cursor:pointer;color:var(--muted);
  font-size:18px;padding:4px;
}
.detail-close:hover{color:var(--text);}
.detail-title{
  font-size:17px;font-weight:800;
  margin-bottom:6px;padding-right:30px;
}
.detail-status{margin-bottom:20px;}
.detail-section{margin-bottom:20px;}
.detail-section-title{
  font-size:10px;color:var(--muted);
  letter-spacing:0.15em;text-transform:uppercase;
  margin-bottom:10px;
}
.detail-row{
  display:flex;justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px solid var(--border);
  font-size:13px;
}
.detail-row:last-child{border-bottom:none;}
.detail-row-label{color:var(--muted);font-size:11px;}
.log-item{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:8px;
  padding:12px;
  margin-bottom:8px;
  font-size:12px;
}
.log-date{font-size:10px;color:var(--muted);margin-bottom:4px;}
.log-note{color:var(--muted2);line-height:1.6;}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px;}

/* LOADING */
.loading{
  display:flex;align-items:center;justify-content:center;
  height:200px;color:var(--muted);font-size:13px;gap:10px;
}
.spinner{
  width:16px;height:16px;
  border:2px solid var(--border2);
  border-top-color:var(--gold);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:768px){
  .sidebar{display:none;}
  .detail-panel{display:none;}
  body{overflow:auto;}
  .main{height:auto;overflow:visible;}
  .content{overflow:visible;}
}

/* ── BOTTOM NAV ── */
/* ── DRAWER ── */
.drawer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
}
.drawer {
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  width: 280px;
  background: var(--bg2, #1a1917);
  border-right: 1px solid var(--card-border);
  z-index: 201;
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding-bottom: env(safe-area-inset-bottom);
}
.drawer.open { transform: translateX(0); }
.drawer-overlay.open { display: block; }
.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.drawer-logo { font-size: 16px; font-weight: 700; color: var(--gold); }
.drawer-close {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 18px;
  cursor: pointer;
  padding: 4px 8px;
}
.drawer-nav { padding: 8px 0; }
.drawer-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  border-radius: 0;
  transition: background 0.15s;
}
.drawer-item:hover { background: rgba(255,255,255,0.04); }
.drawer-item.active { color: var(--gold); background: rgba(232,197,71,0.08); }
.drawer-item .icon { width: 20px; text-align: center; }
.drawer-section {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 12px 16px 4px;
}

/* ── HAMBURGER BUTTON ── */
.hamburger-btn {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  padding: 4px 8px;
  margin-right: 8px;
}
#mobile-toggle-btn { }
body.mobile-mode #mobile-toggle-btn { display: none !important; }
body.mobile-mode .hamburger-btn { display: flex !important; align-items: center; visibility: visible !important; opacity: 1 !important; min-width: 40px; flex-shrink: 0; z-index: 10; }

/* ── MOBILE MODE ── */
body.mobile-mode .sidebar { display: none !important; }
body.mobile-mode .main { margin-left: 0 !important; }
body.mobile-mode .content { padding-bottom: 20px !important; }
body.mobile-mode .topbar { padding: 10px 16px !important; padding-top: max(14px, env(safe-area-inset-top)) !important; }
body.mobile-mode .task-card { padding: 14px 16px !important; }
body.mobile-mode .task-title { font-size: 15px !important; }
body.mobile-mode { overflow: auto; }
body.mobile-mode::before,
body.mobile-mode::after {
  content: '';
  position: fixed;
  top: 0;
  bottom: 0;
  width: 3px;
  z-index: 9999;
  pointer-events: none;
}
body.mobile-mode::before {
  left: 0;
  background: linear-gradient(180deg, #E8C547, #E87047, #47A0E8, #E8C547);
}
body.mobile-mode::after {
  right: 0;
  background: linear-gradient(180deg, #47A0E8, #E8C547, #E87047, #47A0E8);
}
/* 下部グラデーション縁 */
body.mobile-mode .main::after {
  content: '';
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, #E8C547, #E87047, #47A0E8, #E8C547);
  z-index: 9999;
  pointer-events: none;
}
body.mobile-mode .main { height: auto; overflow: visible; }
body.mobile-mode .content { overflow: visible; }

/* ── GRADIENT BORDER EFFECTS (Mobile) ── */
.glow-border {
  position: relative;
  border-radius: 16px;
  background: var(--card-bg);
}
.glow-border::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  padding: 1.5px;
  background: linear-gradient(135deg, #E8C547, #E87047, #E8C547);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0.7;
  pointer-events: none;
}
@keyframes borderRotate {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
.glow-border-anim::before {
  background: linear-gradient(135deg, #E8C547, #E87047, #47A0E8, #E8C547);
  background-size: 300% 300%;
  animation: borderRotate 4s ease infinite;
  opacity: 0.8;
}

/* モバイル：タスクアイテムにグラデーション縁取り */
body.mobile-mode .task-item {
  position: relative;
  border: none !important;
  border-radius: 10px !important;
}
body.mobile-mode .task-item {
  position: relative !important;
  overflow: visible !important;
}
body.mobile-mode .task-item::before {
  content: '';
  position: absolute;
  inset: -1px;

<!-- LOGIN OVERLAY -->
<div id="login-overlay" style="
  position:fixed;inset:0;z-index:9999;
  background:#0A0908;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;
">
  <div style="text-align:center;margin-bottom:40px;">
    <div style="font-size:32px;font-weight:900;color:#E8C547;letter-spacing:-1px;">Entity Task</div>
    <div style="font-size:11px;color:#8A857C;letter-spacing:.2em;margin-top:4px;">RE:POKER INTERNAL</div>
  </div>
  <div style="
    background:#181510;border:1px solid rgba(255,255,255,0.08);

  ">
    <div style="font-size:13px;color:#B8B3A8;margin-bottom:20px;text-align:center;">あなたは誰ですか？</div>
    <div id="login-staff-list" style="display:flex;flex-direction:column;gap:8px;"></div>
  </div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-main">Entity Task</div>
    <div class="logo-sub">Re:Poker Internal</div>
  </div>

  <div class="sidebar-section">メニュー</div>
  <div class="nav-item active" onclick="switchView('dashboard')" id="nav-dashboard">
    <span class="icon">🏠</span> ダッシュボード
  </div>
  <div class="nav-item" onclick="switchView('tasks')" id="nav-tasks">
    <span class="icon">✅</span> 全タスク
  </div>
  <div class="nav-item" onclick="switchView('staff')" id="nav-staff">
    <span class="icon">👥</span> スタッフ
  </div>
  <div class="nav-item" onclick="switchView('today')" id="nav-today">
    <span class="icon">🗒️</span> 今日のボード
  </div>
  <div class="nav-item" onclick="switchView('analytics')" id="nav-analytics">
    <span class="icon">📊</span> 分析
  </div>
  <div class="nav-item" onclick="switchView('pending')" id="nav-pending">
    <span class="icon">🎙️</span> タスク候補
    <span id="pending-badge" style="display:none;background:var(--gold);color:#000;border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700;margin-left:auto;"></span>
  </div>

  <div class="sidebar-section">スタッフ</div>
  <div id="staff-nav"></div>
  <div id="user-badge" style="margin-top:auto;"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <button class="hamburger-btn" id="hamburger-btn" onclick="openDrawer()">☰</button>
    <div class="topbar-title" id="topbar-title">ダッシュボード</div>
    <div class="topbar-actions">
      <button class="btn btn-ghost" id="mobile-toggle-btn" onclick="toggleMobileMode()">📱 モバイル表示</button>
      <button class="btn btn-ghost" onclick="loadAll()">🔄 更新</button>
      <button class="btn btn-primary" onclick="openTaskModal()">＋ タスク追加</button>
    </div>
  </div>

  <div class="filterbar" id="filterbar" style="display:none;">
    <button class="filter-btn active" onclick="setFilter('all',this)">すべて</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" onclick="setFilter('todo',this)">未着手</button>
    <button class="filter-btn" onclick="setFilter('in_progress',this)">進行中</button>
    <button class="filter-btn" onclick="setFilter('done',this)">完了</button>
    <button class="filter-btn" onclick="setFilter('on_hold',this)">保留</button>
    <div class="filter-sep"></div>
    <button class="filter-btn" onclick="setPriority('urgent',this)">🔴 緊急</button>
    <button class="filter-btn" onclick="setPriority('high',this)">🟠 高</button>
  </div>

  <div class="content" id="content">
    <div class="loading"><div class="spinner"></div> 読み込み中...</div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel hidden" id="detail-panel">
  <span class="detail-close" onclick="closeDetail()">✕</span>
  <div id="detail-content"></div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal" style="display:none;" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <h2>✅ タスク追加</h2>
    <div class="form-group">
      <label class="form-label">タスク名 *</label>
      <input class="form-input" id="f-title" placeholder="例：SNS投稿スケジュール作成" />
    </div>
    <div class="form-group">
      <label class="form-label">担当スタッフ *</label>
      <select class="form-select" id="f-staff"></select>
    </div>
    <div class="form-group">
      <label class="form-label">詳細</label>
      <textarea class="form-textarea" id="f-desc" placeholder="タスクの詳細を入力..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">優先度</label>
        <select class="form-select" id="f-priority">
          <option value="low">低</option>
          <option value="medium" selected>中</option>
          <option value="high">高</option>
          <option value="urgent">緊急</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">ステータス</label>
        <select class="form-select" id="f-status">
          <option value="todo" selected>未着手</option>
          <option value="in_progress">進行中</option>
          <option value="done">完了</option>
          <option value="on_hold">保留</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">予定時間（h）</label>
        <input class="form-input" type="number" id="f-est" placeholder="2.5" step="0.5" min="0" />
      </div>
      <div class="form-group">
        <label class="form-label">期限</label>
        <div style="position:relative;">
          <input class="form-input" id="f-due" placeholder="日付を選択..." readonly style="cursor:pointer;padding-right:36px;" />
          <span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;">📅</span>
        </div>
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;" id="due-shortcuts">
          <button type="button" class="filter-btn" onclick="setDueShortcut(0)">今日</button>
          <button type="button" class="filter-btn" onclick="setDueShortcut(1)">明日</button>
          <button type="button" class="filter-btn" onclick="setDueShortcut(3)">3日後</button>
          <button type="button" class="filter-btn" onclick="setDueShortcut(7)">1週間後</button>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">メインタスク（任意）</label>
      <select class="form-select" id="f-parent">
        <option value="">── なし（単独タスク）──</option>
      </select>
      <div style="font-size:11px;color:var(--muted);margin-top:5px;">選択すると、このタスクは選んだタスクのサブタスクになります</div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeTaskModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<!-- LOG MODAL -->
<div class="modal-overlay" id="log-modal" style="display:none;" onclick="closeModalOnOverlay(event)">
  <div class="modal">
    <h2>📝 作業ログ追加</h2>
    <input type="hidden" id="log-task-id" />
    <input type="hidden" id="log-staff-id" />
    <div class="form-group">
      <label class="form-label">作業時間（h）</label>
      <input class="form-input" type="number" id="log-hours" placeholder="1.5" step="0.5" min="0" />
    </div>
    <div class="form-group">
      <label class="form-label">メモ</label>
      <textarea class="form-textarea" id="log-note" placeholder="今日やったこと、進捗など..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeLogModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="saveLog()">保存</button>
    </div>
  </div>
</div>

let allStaff = [];
let allTasks = [];
let allSubtasks = [];
let currentView = 'dashboard';
let currentFilter = 'all';
let currentPriority = 'all';
let selectedStaffId = null;
let pendingSubtasks = [];
let currentUser = null; // ログイン中のスタッフ

// ── LOGIN ──
function showLogin() {
  document.getElementById('login-overlay').style.display = 'flex';
}

function renderLoginStaff() {
  const el = document.getElementById('login-staff-list');
  if (!el) return;
  el.innerHTML = allStaff.map(s => `
    <div onclick="selectUser('${s.id}')" style="
      display:flex;align-items:center;gap:12px;
      padding:14px 18px;border-radius:10px;
      background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
      cursor:pointer;transition:all .15s;
    " onmouseover="this.style.borderColor='${s.color}';this.style.background='${s.color}12'"
       onmouseout="this.style.borderColor='rgba(255,255,255,0.06)';this.style.background='rgba(255,255,255,0.03)'">
      <div style="width:36px;height:36px;border-radius:9px;background:${s.color}20;color:${s.color};
        display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0;">
        ${s.name.charAt(0)}
      </div>
      <div>
        <div style="font-size:14px;font-weight:700;">${s.name}</div>
        <div style="font-size:11px;color:#8A857C;">${s.role}</div>
      </div>
    </div>
  `).join('');
}

function selectUser(staffId) {
  currentUser = allStaff.find(s => s.id === staffId);
  localStorage.setItem('entityCurrentUserId', staffId);
  document.getElementById('login-overlay').style.display = 'none';
  renderUserBadge();
  renderView();
}

function renderUserBadge() {
  const badge = document.getElementById('user-badge');
  if (!badge || !currentUser) return;
  badge.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.06);margin-top:auto;">
      <div style="width:28px;height:28px;border-radius:7px;background:${currentUser.color}20;color:${currentUser.color};
        display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;">
        ${currentUser.name.charAt(0)}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${currentUser.name}</div>
        <div style="font-size:10px;color:#8A857C;">${currentUser.role}</div>
      </div>
      <div onclick="showLogin()" title="切り替え"
        style="cursor:pointer;color:#8A857C;font-size:12px;flex-shrink:0;padding:4px;" title="ユーザー切替">⇄</div>
    </div>
  `;
}

// ── INIT ──
async function loadAll() {
  const [sRes, tRes, stRes] = await Promise.all([
    sb.from('staff').select('*').order('created_at'),
    sb.from('tasks').select('*').order('created_at', {ascending: false}),
    sb.from('subtasks').select('*').order('created_at')
  ]);
  allStaff    = sRes.data || [];
  allTasks    = tRes.data || [];
  allSubtasks = stRes.data || [];

  // 前回のユーザーを復元
  const savedId = localStorage.getItem('entityCurrentUserId');
  if (savedId) {
    const saved = allStaff.find(s => s.id === savedId);
    if (saved) { currentUser = saved; document.getElementById('login-overlay').style.display = 'none'; }
    else showLogin();
  } else {
    showLogin();
  }

  renderLoginStaff();
  renderUserBadge();
  renderStaffNav();
  updatePendingBadge();
  renderView();
}

function getStaffPerformance(staffId) {
  const now = new Date();
  const d7 = new Date(now - 7*24*60*60*1000).toISOString();
  const d1 = new Date(now - 24*60*60*1000).toISOString();
  const recentDone = allTasks.filter(t =>
    t.staff_id === staffId && t.status === 'done' && t.completed_at && t.completed_at >= d7
  );
  const todayDone = allTasks.filter(t =>
    t.staff_id === staffId && t.status === 'done' && t.completed_at && t.completed_at >= d1
  );
  return { recentDone: recentDone.length, todayDone: todayDone.length };
}

function getStaffEmoji(staffId) {
  const allCounts = allStaff.map(s => getStaffPerformance(s.id).recentDone);
  const max = Math.max(...allCounts);
  const { recentDone } = getStaffPerformance(staffId);
  if (recentDone === 0) return '🧊';
  if (max > 0 && recentDone >= max * 0.7) return '🔥';
  return null;
}

function getOnlineStatus(staffId) {
  const d2 = new Date(Date.now() - 2*24*60*60*1000).toISOString();
  const recentActivity = allTasks.some(t =>
    t.staff_id === staffId && t.status === 'done' && t.completed_at && t.completed_at >= d2
  );
  return recentActivity;
}

function renderStaffNav() {
  const el = document.getElementById('staff-nav');
  el.innerHTML = allStaff.map(s => {
    const cnt = allTasks.filter(t => t.staff_id === s.id && t.status !== 'done').length;
    const emoji = getStaffEmoji(s.id);
    const online = getOnlineStatus(s.id);
    const avatarSrc = STAFF_AVATARS[s.id];
    return `<div class="staff-item" onclick="filterByStaff('${s.id}')" id="snav-${s.id}">
      <div style="position:relative;flex-shrink:0;">
        ${avatarSrc
          ? `<img src="${avatarSrc}" class="staff-avatar-sm" style="width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;" />`
          : `<div class="staff-dot" style="background:${s.color}"></div>`}
        ${online ? `<div style="position:absolute;width:5px;height:5px;background:#47E8A0;border-radius:50%;bottom:-1px;right:-1px;border:1px solid var(--bg2);"></div>` : ''}
      </div>
      <span style="flex:1;">${s.name}</span>
      ${emoji ? `<span style="font-size:13px;">${emoji}</span>` : ''}
      ${cnt > 0 ? `<span class="staff-count">${cnt}</span>` : ''}
    </div>`;
  }).join('');
}

// ── VIEW SWITCH ──
function switchView(view) {
  currentView = view;
  selectedStaffId = null;
  currentFilter = 'all';
  currentPriority = 'all';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-'+view)?.classList.add('active');
  document.querySelectorAll('.staff-item').forEach(el => el.classList.remove('active'));
  // ドロワーメニューのactive更新
  document.querySelectorAll('.drawer-item').forEach(el => el.classList.remove('active'));
  const drEl = document.getElementById('dr-' + view);
  if (drEl) drEl.classList.add('active');
  document.getElementById('filterbar').style.display = (view === 'tasks') ? 'flex' : 'none';
  if (view === 'today') { document.getElementById('topbar-title').textContent = '今日のボード'; }
  if (view === 'analytics') { document.getElementById('topbar-title').textContent = 'スタッフ分析'; }
  if (view === 'pending') { document.getElementById('topbar-title').textContent = 'タスク候補（音声抽出）'; }
  closeDetail();
  renderView();
}

function filterByStaff(id) {
  currentView = 'tasks';
  selectedStaffId = id;
  currentFilter = 'all';
  currentPriority = 'all';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.staff-item').forEach(el => el.classList.remove('active'));
  document.getElementById('snav-'+id)?.classList.add('active');
  document.getElementById('filterbar').style.display = 'flex';
  closeDetail();
  renderView();
}

function renderView() {
  const content = document.getElementById('content');
  if (currentView === 'dashboard') {
    document.getElementById('topbar-title').textContent = 'ダッシュボード';
    content.innerHTML = renderDashboard();
  } else if (currentView === 'tasks') {
    const staffName = selectedStaffId
      ? allStaff.find(s => s.id === selectedStaffId)?.name + ' のタスク'
      : '全タスク';
    document.getElementById('topbar-title').textContent = staffName;
    content.innerHTML = renderTaskList();
  } else if (currentView === 'staff') {
    document.getElementById('topbar-title').textContent = 'スタッフ一覧';
    content.innerHTML = renderStaffView();
  } else if (currentView === 'today') {
    document.getElementById('topbar-title').textContent = '今日のボード';
    content.innerHTML = renderTodayBoard();
    initTodayBoard();
  } else if (currentView === 'analytics') {
    document.getElementById('topbar-title').textContent = 'スタッフ分析';
    content.innerHTML = renderAnalytics();
    initAnalytics();
  } else if (currentView === 'pending') {
    document.getElementById('topbar-title').textContent = 'タスク候補（音声抽出）';
    renderPending();
  }
}

// ── DASHBOARD ──
function renderDashboard() {
  const total = allTasks.length;
  const todo = allTasks.filter(t => t.status === 'todo').length;
  const wip  = allTasks.filter(t => t.status === 'in_progress').length;
  const done = allTasks.filter(t => t.status === 'done').length;
  const urgent = allTasks.filter(t => t.priority === 'urgent' && t.status !== 'done').length;
  const today = new Date().toISOString().split('T')[0];
  const overdue = allTasks.filter(t => t.due_date && t.due_date < today && t.status !== 'done').length;
  const totalEst = allTasks.reduce((s, t) => s + (t.estimated_hours || 0), 0);
  const totalAct = allTasks.reduce((s, t) => s + (t.actual_hours || 0), 0);

  const inProgressTasks = allTasks.filter(t => t.status === 'in_progress').slice(0, 8);
  const todayTasks = allTasks.filter(t => t.due_date === today && t.status !== 'done').slice(0, 8);
  const urgentTasks = allTasks.filter(t => t.priority === 'urgent' && t.status !== 'done').slice(0, 6);

  return `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">TOTAL TASKS</div>
        <div class="stat-val" style="color:var(--gold)">${total}</div>
        <div class="stat-sub">全タスク</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">IN PROGRESS</div>
        <div class="stat-val" style="color:var(--blue)">${wip}</div>
        <div class="stat-sub">進行中</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TODO</div>
        <div class="stat-val" style="color:var(--muted2)">${todo}</div>
        <div class="stat-sub">未着手</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">DONE</div>
        <div class="stat-val" style="color:var(--green)">${done}</div>
        <div class="stat-sub">完了</div>
      </div>
      ${urgent > 0 ? `<div class="stat-card" style="border-color:rgba(232,71,71,0.3)">
        <div class="stat-label">URGENT</div>
        <div class="stat-val" style="color:var(--red)">${urgent}</div>
        <div class="stat-sub">緊急タスク</div>
      </div>` : ''}
      ${overdue > 0 ? `<div class="stat-card" style="border-color:rgba(232,71,71,0.3)">
        <div class="stat-label">OVERDUE</div>
        <div class="stat-val" style="color:var(--red)">${overdue}</div>
        <div class="stat-sub">期限超過</div>
      </div>` : ''}
      <div class="stat-card">
        <div class="stat-label">TIME</div>
        <div class="stat-val" style="color:var(--teal);font-size:20px;">${totalAct.toFixed(1)}h</div>
        <div class="stat-sub">/ ${totalEst.toFixed(1)}h 予定</div>
      </div>
    </div>

    ${urgentTasks.length > 0 ? `
    <div class="section-title">🔴 緊急タスク</div>
    <div class="task-list">${urgentTasks.map(t => taskRow(t)).join('')}</div>` : ''}

    ${todayTasks.length > 0 ? `
    <div class="section-title">📅 今日期限</div>
    <div class="task-list">${todayTasks.map(t => taskRow(t)).join('')}</div>` : ''}

    <div class="section-title">⚡ 進行中</div>
    <div class="task-list">
      ${inProgressTasks.length > 0 ? inProgressTasks.map(t => taskRow(t)).join('') :
        '<div class="empty"><div class="empty-icon">🎯</div><p>進行中のタスクなし</p></div>'}
    </div>
  `;
}

// ── TASK LIST ──
function renderTaskList() {
  let tasks = allTasks;
  if (selectedStaffId) tasks = tasks.filter(t => t.staff_id === selectedStaffId);
  if (currentFilter !== 'all') tasks = tasks.filter(t => t.status === currentFilter);
  if (currentPriority !== 'all') tasks = tasks.filter(t => t.priority === currentPriority);

  const todo = tasks.filter(t => t.status === 'todo');
  const wip  = tasks.filter(t => t.status === 'in_progress');
  const hold = tasks.filter(t => t.status === 'on_hold');
  const done = tasks.filter(t => t.status === 'done');

  // 親タスクのみ表示（子タスクは親の下に入れる）
  const renderSection = (title, items) => {
    const parents = items.filter(t => !t.parent_task_id);
    if (parents.length === 0) return '';
    return `<div class="section-title">${title} (${items.length})</div>
    <div class="task-list">${parents.map(t => {
      const children = allTasks.filter(c => c.parent_task_id === t.id);
      return taskRow(t) + (children.length > 0 ?
        `<div style="padding-left:20px;display:flex;flex-direction:column;gap:4px;margin-top:-2px;">
          ${children.map(c => taskRow(c, true)).join('')}
        </div>` : '');
    }).join('')}</div>`;
  };

  if (currentFilter !== 'all' || currentPriority !== 'all') {
    return tasks.length === 0
      ? '<div class="empty"><div class="empty-icon">✅</div><p>タスクなし</p></div>'
      : `<div class="task-list">${tasks.filter(t => !t.parent_task_id).map(t => taskRow(t)).join('')}</div>`;
  }

  return renderSection('⚡ 進行中', wip)
    + renderSection('📋 未着手', todo)
    + renderSection('⏸ 保留', hold)
    + renderSection('✅ 完了', done)
    || '<div class="empty"><div class="empty-icon">🎉</div><p>タスクなし</p></div>';
}

function taskRow(t, isChild = false) {
  const staff = allStaff.find(s => s.id === t.staff_id);
  const today = new Date().toISOString().split('T')[0];
  let dueClass = 'ok', dueText = '';
  if (t.due_date) {
    dueText = formatDate(t.due_date);
    if (t.due_date < today && t.status !== 'done') dueClass = 'overdue';
    else if (t.due_date === today) dueClass = 'today';
  }
  const statusLabel = {todo:'未着手', in_progress:'進行中', done:'完了', on_hold:'保留'}[t.status] || t.status;
  const priorityLabel = {low:'低', medium:'中', high:'高', urgent:'緊急'}[t.priority] || t.priority;

  // サブタスク進捗（子タスクで計算）
  const subs = allTasks.filter(s => s.parent_task_id === t.id);
  const subDone = subs.filter(s => s.status === 'done').length;
  const subTotal = subs.length;
  const subPct = subTotal > 0 ? Math.round(subDone / subTotal * 100) : null;

  return `<div class="task-item" onclick="openDetail('${t.id}')" style="flex-direction:column;align-items:stretch;gap:8px;${isChild?'border-left:2px solid rgba(71,160,232,0.3);border-radius:0 10px 10px 0;':''}"
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="task-check ${t.status === 'done' ? 'done' : ''}"
        onclick="event.stopPropagation();toggleDone('${t.id}','${t.status}')">
        ${t.status === 'done' ? '✓' : ''}
      </div>
      <div class="task-title ${t.status === 'done' ? 'done' : ''}" style="flex:1;">${t.title}</div>
      <div class="task-meta">
        <span class="badge badge-${t.priority}">${priorityLabel}</span>
        <span class="badge badge-${t.status}">${statusLabel}</span>
        ${staff ? `<span class="task-staff">
          <span class="task-staff-dot" style="background:${staff.color}"></span>
          ${staff.name}
        </span>` : ''}
        ${t.estimated_hours ? `<span class="task-hours">${t.actual_hours||0}/${t.estimated_hours}h</span>` : ''}
        ${dueText ? `<span class="task-due ${dueClass}">${dueText}</span>` : ''}
      </div>
    </div>
    ${subTotal > 0 ? `
    <div style="padding-left:30px;">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:3px;">
        <span>サブタスク ${subDone}/${subTotal}</span>
        <span style="color:${subPct===100?'var(--green)':'var(--muted)'}">${subPct}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${subPct}%;background:${subPct===100?'var(--green)':'var(--blue)'};"></div>
      </div>
    </div>` : ''}
  </div>`;
}

function closeDetail() {
  document.getElementById('detail-panel').classList.add('hidden');
}

async function changeStatus(taskId, status) {
  const upd = {status};
  if (status === 'done') upd.completed_at = new Date().toISOString();
  const { error } = await sb.from('tasks').update(upd).eq('id', taskId);
  if (!error) { showToast('ステータスを更新しました', 'success'); await loadAll(); openDetail(taskId); }
}

async function toggleDone(taskId, currentStatus) {
  const newStatus = currentStatus === 'done' ? 'todo' : 'done';
  await sb.from('tasks').update({status: newStatus}).eq('id', taskId);
  await loadAll();
  renderView();
}

// ── SUBTASK（parent_task_id方式）──
async function toggleSubtaskStatus(subId, currentStatus, parentTaskId) {
  const newStatus = currentStatus === 'done' ? 'todo' : 'done';
  await sb.from('tasks').update({ status: newStatus }).eq('id', subId);
  await loadAll();
  openDetail(parentTaskId);
}

// ── TASK MODAL ──
function openTaskModal() {
  const sel = document.getElementById('f-staff');
  sel.innerHTML = allStaff.map(s => `<option value="${s.id}">${s.name} (${s.role})</option>`).join('');
  // ログインユーザー優先、次にselectしたスタッフ
  if (currentUser) sel.value = currentUser.id;
  else if (selectedStaffId) sel.value = selectedStaffId;

  // メインタスク候補（未完了のトップレベルタスクのみ）
  const parentSel = document.getElementById('f-parent');
  const candidates = allTasks.filter(t => t.status !== 'done' && !t.parent_task_id);
  parentSel.innerHTML = '<option value="">── なし（単独タスク）──</option>'
    + candidates.map(t => {
        const staff = allStaff.find(s => s.id === t.staff_id);
        return `<option value="${t.id}">${t.title}${staff ? ' (' + staff.name + ')' : ''}</option>`;
      }).join('');

  pendingSubtasks = [];
  renderPendingSubtasks();
  document.getElementById('task-modal').style.display = 'flex';
  setTimeout(() => initDatePicker(), 50);
}
function closeTaskModal() {
  document.getElementById('task-modal').style.display = 'none';
  ['f-title','f-desc','f-est'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-parent').value = '';
  if (duePicker) duePicker.clear();
  pendingSubtasks = [];
  renderPendingSubtasks();
  document.querySelectorAll('#due-shortcuts .filter-btn').forEach(b => b.classList.remove('active'));
}
async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showToast('タスク名を入力してください', 'error'); return; }
  const parentId = document.getElementById('f-parent').value || null;
  const task = {
    title,
    description: document.getElementById('f-desc').value.trim() || null,
    staff_id: document.getElementById('f-staff').value,
    priority: document.getElementById('f-priority').value,
    status: document.getElementById('f-status').value,
    estimated_hours: parseFloat(document.getElementById('f-est').value) || null,
    due_date: document.getElementById('f-due').value || null,
    parent_task_id: parentId,
  };

  const { data, error } = await sb.from('tasks').insert(task).select();
  if (error) { showToast('保存に失敗しました', 'error'); return; }

  showToast('タスクを追加しました ✅', 'success');
  closeTaskModal();
  await loadAll();
  renderView();
}

// ── LOG MODAL ──
function openLogModal(taskId, staffId) {
  document.getElementById('log-task-id').value = taskId;
  document.getElementById('log-staff-id').value = staffId;
  document.getElementById('log-modal').style.display = 'flex';
}
function closeLogModal() {
  document.getElementById('log-modal').style.display = 'none';
  document.getElementById('log-hours').value = '';
  document.getElementById('log-note').value = '';
}
async function saveLog() {
  const taskId = document.getElementById('log-task-id').value;
  const staffId = document.getElementById('log-staff-id').value;
  const hours = parseFloat(document.getElementById('log-hours').value) || 0;
  const note = document.getElementById('log-note').value.trim();
  const { error: logErr } = await sb.from('task_logs').insert({
    task_id: taskId, staff_id: staffId, hours_worked: hours, note: note || null
  });
  if (logErr) { showToast('保存に失敗しました', 'error'); return; }
  // 実績時間を更新
  const task = allTasks.find(t => t.id === taskId);
  const newAct = (task?.actual_hours || 0) + hours;
  await sb.from('tasks').update({actual_hours: newAct}).eq('id', taskId);
  showToast('ログを追加しました ✅', 'success');
  closeLogModal();
  await loadAll();
  openDetail(taskId);
}

async function deleteTask(taskId) {
  if (!confirm('このタスクを削除しますか？')) return;
  await sb.from('task_logs').delete().eq('task_id', taskId);
  await sb.from('subtasks').delete().eq('task_id', taskId);
  await sb.from('tasks').delete().eq('id', taskId);
  showToast('タスクを削除しました', 'success');
  closeDetail();
  await loadAll();
  renderView();
}

// ── FILTER ──
function setFilter(f, el) {
  currentFilter = f; currentPriority = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderView();
}
function setPriority(p, el) {
  currentPriority = (currentPriority === p) ? 'all' : p;
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (currentPriority !== 'all') el.classList.add('active');
  renderView();
}

// ── UTILS ──
function formatDate(d) {
  if (!d) return '';
  const date = new Date(d);
  return `${date.getMonth()+1}/${date.getDate()}`;
}
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}
function closeModalOnOverlay(e) {
  if (e.target === e.currentTarget) {
    closeTaskModal();
    closeLogModal();
  }
}

let sortableInstance = null;

function initTodayBoard() {
  const staffSel = document.getElementById('board-staff-sel');
  if (staffSel && currentUser) {
    staffSel.value = currentUser.id;
    updateBoardCandidates();
  }
  renderBoardList();
  updateBoardStats();
  initSortable();
}

function initSortable() {
  const el = document.getElementById('board-list');
  if (!el || typeof Sortable === 'undefined') return;
  if (sortableInstance) sortableInstance.destroy();
  sortableInstance = Sortable.create(el, {
    animation: 180,
    handle: '.drag-handle',
    ghostClass: 'sortable-ghost',
    chosenClass: 'sortable-chosen',
    onEnd: function(evt) {
      const moved = todayBoardOrder.splice(evt.oldIndex, 1)[0];
      todayBoardOrder.splice(evt.newIndex, 0, moved);
      saveBoardState();
      renderBoardList();
      updateBoardStats();
      initSortable();
    }
  });
}

function updateBoardCandidates() {
  const staffId = document.getElementById('board-staff-sel')?.value;
  const el = document.getElementById('board-candidates');
  if (!el) return;
  if (!staffId) {
    el.innerHTML = '<div class="board-empty"><div class="board-empty-icon">👆</div>スタッフを選択</div>';
    return;
  }
  const tasks = allTasks.filter(t => t.staff_id === staffId && t.status !== 'done');
  if (tasks.length === 0) {
    el.innerHTML = '<div class="board-empty"><p>未完了のタスクなし</p></div>';
    return;
  }
  const staff = allStaff.find(s => s.id === staffId);
  el.innerHTML = tasks.map(t => {
    const added = todayBoardOrder.includes(t.id);
    const pColor = {low:'var(--muted)', medium:'var(--gold)', high:'var(--orange)', urgent:'var(--red)'}[t.priority];
    const isChild = !!t.parent_task_id;
    return `<div class="task-chip ${added?'task-chip-added':''}" onclick="addToBoard('${t.id}')">
      <div class="task-chip-dot" style="background:${staff?.color||'var(--muted)'}"></div>
      <div style="flex:1;min-width:0;">
        <div style="${isChild?'padding-left:10px;color:var(--muted2);':''}">${isChild?'↳ ':''}<span style="${added?'text-decoration:line-through;':''}">${t.title}</span></div>
      </div>
      <span style="font-size:10px;color:${pColor};flex-shrink:0;">●</span>
      ${added ? '<span style="font-size:10px;color:var(--green);">追加済</span>' : '<span style="font-size:18px;color:var(--gold);">+</span>'}
    </div>`;
  }).join('');
}

function addToBoard(taskId) {
  if (!taskId) return;
  if (todayBoardOrder.includes(taskId)) { showToast('すでに追加済みです', 'error'); return; }
  todayBoardOrder.push(taskId);
  saveBoardState();
  renderBoardList();
  updateBoardStats();
  updateBoardCandidates(); // 追加済みマーク更新
  initSortable();
  showToast('追加しました ✅', 'success');
}

function toggleBoardDone(taskId) {
  const idx = todayBoardDone.indexOf(taskId);
  if (idx >= 0) todayBoardDone.splice(idx, 1);
  else todayBoardDone.push(taskId);
  saveBoardState();
  renderBoardList();
  updateBoardStats();
}

function removeFromBoard(taskId) {
  todayBoardOrder = todayBoardOrder.filter(id => id !== taskId);
  saveBoardState();
  renderBoardList();
  updateBoardStats();
}

function clearDoneFromBoard() {
  todayBoardOrder = todayBoardOrder.filter(id => !todayBoardDone.includes(id));
  todayBoardDone = todayBoardDone.filter(id => todayBoardOrder.includes(id));
  saveBoardState();
  renderBoardList();
  updateBoardStats();
  updateBoardCandidates();
  initSortable();
}

function clearAllBoard() {
  if (!confirm('ボードを全消去しますか？')) return;
  todayBoardOrder = [];
  todayBoardDone  = [];
  saveBoardState();
  renderBoardList();
  updateBoardStats();
  updateBoardCandidates();
}

function saveBoardState() {
  localStorage.setItem('todayBoardOrder', JSON.stringify(todayBoardOrder));
  localStorage.setItem('todayBoardDone',  JSON.stringify(todayBoardDone));
}

function renderBoardList() {
  const el = document.getElementById('board-list');
  if (!el) return;
  if (todayBoardOrder.length === 0) {
    el.innerHTML = `<div class="board-empty"><div class="board-empty-icon">🗒️</div><p>左からタスクを追加してください</p></div>`;
    return;
  }
  el.innerHTML = todayBoardOrder.map((id, idx) => {
    const t = allTasks.find(x => x.id === id);
    if (!t) return '';
    const staff = allStaff.find(s => s.id === t.staff_id);
    const isDone = todayBoardDone.includes(id);
    const pColor = {low:'var(--muted)', medium:'var(--gold)', high:'var(--orange)', urgent:'var(--red)'}[t.priority];
    const pLabel = {low:'低', medium:'中', high:'高', urgent:'🔴'}[t.priority];
    return `<div class="board-task ${isDone?'done-item':''}" data-id="${id}">
      <div class="drag-handle" title="ドラッグで並び替え">⠿⠿</div>
      <div class="priority-num">${idx+1}</div>
      <div class="bt-check ${isDone?'done':''}" onclick="toggleBoardDone('${id}')">
        ${isDone ? '✓' : ''}
      </div>
      <div style="flex:1;min-width:0;">
        <div class="bt-title">${t.title}</div>
        <div class="bt-sub">
          ${staff ? `<span style="color:${staff.color}">${staff.name}</span>` : ''}
          ${t.estimated_hours ? ` · 予定${t.estimated_hours}h` : ''}
          ${t.due_date ? ` · ${formatDate(t.due_date)}期限` : ''}
        </div>
      </div>
      <span style="font-size:10px;color:${pColor};flex-shrink:0;">${pLabel}</span>
      <span onclick="removeFromBoard('${id}')"
        style="cursor:pointer;color:var(--muted);font-size:13px;flex-shrink:0;padding:4px 6px;border-radius:4px;"
        onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">✕</span>
    </div>`;
  }).join('');
}

function updateBoardStats() {
  const total = todayBoardOrder.length;
  const done = todayBoardDone.filter(id => todayBoardOrder.includes(id)).length;
  const pct = total > 0 ? Math.round(done/total*100) : 0;
  const el1 = document.getElementById('bs-total');
  const el2 = document.getElementById('bs-done');
  const el3 = document.getElementById('bs-left');
  const elPct = document.getElementById('bs-pct');
  const elBar = document.getElementById('bs-bar');
  if (el1) { el1.textContent = total; el2.textContent = done; el3.textContent = total - done; }
  if (elPct) elPct.textContent = pct + '%';
  if (elBar) {
    elBar.style.width = pct + '%';
    elBar.style.background = pct === 100 ? 'var(--green)' : pct >= 50 ? 'var(--gold)' : 'var(--blue)';
  }
}

let analyticsCharts = [];

function renderAnalytics() {
  const today = new Date().toISOString().split('T')[0];
  const thirtyDaysAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];

  return `
  <style>
    .analytics-controls {
      display:flex; flex-wrap:wrap; gap:12px; align-items:center;

    .analytics-summary {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-bottom:24px;
    }
    .as-card {
      background:var(--bg3); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center;
    }
    .as-val { font-size:26px; font-weight:900; line-height:1; }
    .as-label { font-size:10px; color:var(--muted); margin-top:4px; letter-spacing:.08em; }
    .task-history {
      background:var(--bg3); border:1px solid var(--border); border-radius:14px; padding:20px; margin-top:20px;
    }
    .task-history h3 { font-size:12px; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; margin-bottom:14px; }
    .history-item {
      display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); font-size:12px;
    }
    .history-item:last-child { border-bottom:none; }
  </style>

  <div class="analytics-controls">
    <div>
      <label>スタッフ</label><br>
      <select id="a-staff" onchange="runAnalytics()">
        <option value="">全員</option>
        ${allStaff.map(s => `<option value="${s.id}">${s.name}</option>`).join('')}
      </select>
    </div>
    <div>
      <label>開始日</label><br>
      <input type="date" id="a-from" value="${thirtyDaysAgo}" onchange="runAnalytics()" />
    </div>
    <div>
      <label>終了日</label><br>
      <input type="date" id="a-to" value="${today}" onchange="runAnalytics()" />
    </div>
    <div style="display:flex;gap:6px;align-items:flex-end;padding-top:16px;">
      <button class="filter-btn" onclick="setAnalyticsPeriod(7)">7日</button>
      <button class="filter-btn" onclick="setAnalyticsPeriod(30)">30日</button>
      <button class="filter-btn" onclick="setAnalyticsPeriod(90)">90日</button>
    </div>
  </div>

  <div class="analytics-summary" id="a-summary"></div>

  <div class="analytics-grid">
    <div class="chart-card">
      <h3>📊 ステータス分布</h3>
      <div class="chart-wrap"><canvas id="chart-status"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>🔥 優先度分布</h3>
      <div class="chart-wrap"><canvas id="chart-priority"></canvas></div>
    </div>
    <div class="chart-card" style="grid-column:1/-1;">
      <h3>📈 完了タスク推移（週別）</h3>
      <div class="chart-wrap" style="height:200px;"><canvas id="chart-weekly"></canvas></div>
    </div>
    <div class="chart-card" style="grid-column:1/-1;" id="a-staff-breakdown" style="display:none;">
      <h3>👥 スタッフ別タスク数</h3>
      <div class="chart-wrap" style="height:200px;"><canvas id="chart-staff"></canvas></div>
    </div>

  <div class="task-history" id="a-history">
    <h3>📋 タスク履歴</h3>

function initAnalytics() {
  runAnalytics();
}

function setAnalyticsPeriod(days) {
  const to = new Date().toISOString().split('T')[0];
  const from = new Date(Date.now() - days*24*60*60*1000).toISOString().split('T')[0];
  document.getElementById('a-from').value = from;
  document.getElementById('a-to').value = to;
  runAnalytics();
}

function destroyCharts() {
  analyticsCharts.forEach(c => c.destroy());
  analyticsCharts = [];
}

function runAnalytics() {
  destroyCharts();
  const staffId = document.getElementById('a-staff')?.value || '';
  const from = document.getElementById('a-from')?.value || '';
  const to   = document.getElementById('a-to')?.value   || '';

  let tasks = allTasks;
  if (staffId) tasks = tasks.filter(t => t.staff_id === staffId);
  if (from)    tasks = tasks.filter(t => t.created_at >= from);
  if (to)      tasks = tasks.filter(t => t.created_at <= to + 'T23:59:59');

  const total  = tasks.length;
  const done   = tasks.filter(t => t.status === 'done').length;
  const wip    = tasks.filter(t => t.status === 'in_progress').length;
  const todo   = tasks.filter(t => t.status === 'todo').length;
  const urgent = tasks.filter(t => t.priority === 'urgent').length;
  const totalEst = tasks.reduce((a,t)=>a+(t.estimated_hours||0),0);
  const totalAct = tasks.reduce((a,t)=>a+(t.actual_hours||0),0);
  const rate = total > 0 ? Math.round(done/total*100) : 0;

  // サマリー
  document.getElementById('a-summary').innerHTML = `
    <div class="as-card"><div class="as-val" style="color:var(--gold)">${total}</div><div class="as-label">総タスク</div></div>
    <div class="as-card"><div class="as-val" style="color:var(--green)">${done}</div><div class="as-label">完了</div></div>
    <div class="as-card"><div class="as-val" style="color:var(--blue)">${wip}</div><div class="as-label">進行中</div></div>
    <div class="as-card"><div class="as-val" style="color:var(--muted2)">${todo}</div><div class="as-label">未着手</div></div>
    <div class="as-card"><div class="as-val" style="color:var(--gold)">${rate}%</div><div class="as-label">達成率</div></div>
    <div class="as-card"><div class="as-val" style="color:var(--teal);font-size:18px">${totalAct.toFixed(1)}h</div><div class="as-label">実績 / ${totalEst.toFixed(1)}h予定</div></div>
    ${urgent>0 ? `<div class="as-card" style="border-color:rgba(232,71,71,.3)"><div class="as-val" style="color:var(--red)">${urgent}</div><div class="as-label">緊急タスク</div></div>` : ''}
  `;

  const chartDefaults = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { labels: { color: '#B8B3A8', font: { size: 11 } } } }
  };

  // ステータス円グラフ
  const ctxStatus = document.getElementById('chart-status');
  if (ctxStatus) {
    analyticsCharts.push(new Chart(ctxStatus, {
      type: 'doughnut',
      data: {
        labels: ['未着手', '進行中', '完了', '保留'],
        datasets: [{
          data: [todo, wip, done, tasks.filter(t=>t.status==='on_hold').length],
          backgroundColor: ['rgba(184,179,168,0.6)','rgba(71,160,232,0.7)','rgba(71,232,160,0.7)','rgba(232,112,71,0.7)'],
          borderColor: ['#B8B3A8','#47A0E8','#47E8A0','#E87047'],
          borderWidth: 1.5
        }]
      },
      options: { ...chartDefaults, cutout: '62%' }
    }));
  }

  // 優先度円グラフ
  const ctxPriority = document.getElementById('chart-priority');
  if (ctxPriority) {
    analyticsCharts.push(new Chart(ctxPriority, {
      type: 'doughnut',
      data: {
        labels: ['低', '中', '高', '緊急'],
        datasets: [{
          data: ['low','medium','high','urgent'].map(p => tasks.filter(t=>t.priority===p).length),
          backgroundColor: ['rgba(138,133,124,0.6)','rgba(232,197,71,0.7)','rgba(232,112,71,0.7)','rgba(232,71,71,0.7)'],
          borderColor: ['#8A857C','#E8C547','#E87047','#E84747'],
          borderWidth: 1.5
        }]
      },
      options: { ...chartDefaults, cutout: '62%' }
    }));
  }

  // 週別完了推移（折れ線）
  const weekMap = {};
  tasks.filter(t => t.status === 'done' && t.completed_at).forEach(t => {
    const d = new Date(t.completed_at);
    const weekStart = new Date(d);
    weekStart.setDate(d.getDate() - d.getDay());
    const key = weekStart.toISOString().split('T')[0];
    weekMap[key] = (weekMap[key] || 0) + 1;
  });
  const weekKeys = Object.keys(weekMap).sort();
  const ctxWeekly = document.getElementById('chart-weekly');
  if (ctxWeekly) {
    analyticsCharts.push(new Chart(ctxWeekly, {
      type: 'bar',
      data: {
        labels: weekKeys.map(k => { const d = new Date(k); return `${d.getMonth()+1}/${d.getDate()}週`; }),
        datasets: [{
          label: '完了タスク数',
          data: weekKeys.map(k => weekMap[k]),
          backgroundColor: 'rgba(71,232,160,0.5)',
          borderColor: '#47E8A0',
          borderWidth: 1.5,
          borderRadius: 6
        }]
      },
      options: {
        ...chartDefaults,
        scales: {
          x: { ticks: { color:'#8A857C' }, grid: { color:'rgba(255,255,255,0.04)' } },
          y: { ticks: { color:'#8A857C' }, grid: { color:'rgba(255,255,255,0.04)' }, beginAtZero: true }
        }
      }
    }));
  }

  // スタッフ別（全員選択時のみ）
  const staffBreakdown = document.getElementById('a-staff-breakdown');
  const ctxStaff = document.getElementById('chart-staff');
  if (!staffId && ctxStaff) {
    if (staffBreakdown) staffBreakdown.style.display = 'block';
    const staffCounts = allStaff.map(s => ({
      name: s.name,
      color: s.color,
      total: tasks.filter(t => t.staff_id === s.id).length,
      done: tasks.filter(t => t.staff_id === s.id && t.status === 'done').length,
    })).filter(s => s.total > 0);

    analyticsCharts.push(new Chart(ctxStaff, {
      type: 'bar',
      data: {
        labels: staffCounts.map(s => s.name),
        datasets: [
          {
            label: '完了',
            data: staffCounts.map(s => s.done),
            backgroundColor: staffCounts.map(s => s.color + 'AA'),
            borderColor: staffCounts.map(s => s.color),
            borderWidth: 1.5, borderRadius: 6
          },
          {
            label: '未完了',
            data: staffCounts.map(s => s.total - s.done),
            backgroundColor: 'rgba(255,255,255,0.06)',
            borderColor: 'rgba(255,255,255,0.12)',
            borderWidth: 1, borderRadius: 6
          }
        ]
      },
      options: {
        ...chartDefaults,
        scales: {
          x: { stacked: true, ticks: { color:'#8A857C' }, grid: { color:'rgba(255,255,255,0.04)' } },
          y: { stacked: true, ticks: { color:'#8A857C' }, grid: { color:'rgba(255,255,255,0.04)' }, beginAtZero: true }
        }
      }
    }));
  } else if (staffBreakdown) {
    staffBreakdown.style.display = 'none';
  }

  // タスク履歴リスト
  const doneTasks = tasks.filter(t => t.status === 'done').sort((a,b) => (b.completed_at||'').localeCompare(a.completed_at||''));
  const historyEl = document.getElementById('a-history-list');
  if (historyEl) {
    historyEl.innerHTML = doneTasks.length === 0
      ? '<div class="empty"><p>完了タスクなし</p></div>'
      : doneTasks.map(t => {
          const staff = allStaff.find(s => s.id === t.staff_id);
          const pLabel = {low:'低', medium:'中', high:'高', urgent:'緊急'}[t.priority];
          const pColor = {low:'var(--muted)', medium:'var(--gold)', high:'var(--orange)', urgent:'var(--red)'}[t.priority];
          return `<div class="history-item">
            <span style="font-size:11px;color:var(--green);flex-shrink:0;">✓</span>
            <div style="flex:1;">
              <div>${t.title}</div>
              ${staff ? `<div style="font-size:10px;color:${staff.color};margin-top:2px;">${staff.name}</div>` : ''}
            </div>
            <span class="badge" style="background:${pColor}20;color:${pColor};flex-shrink:0;">${pLabel}</span>
            ${t.actual_hours ? `<span style="font-size:10px;color:var(--teal);flex-shrink:0;">${t.actual_hours}h</span>` : ''}
            ${t.completed_at ? `<span style="font-size:10px;color:var(--muted);flex-shrink:0;">${formatDate(t.completed_at)}</span>` : ''}
          </div>`;
        }).join('');
  }
}

// ══════════════════════════════
// タスク候補（音声抽出）
// ══════════════════════════════
function updatePendingBadge() {
  const badge = document.getElementById('pending-badge');
  if (!badge) return;
  sb.from('tasks')
    .select('id', { count: 'exact', head: true })
    .eq('source', 'voice')
    .eq('status', 'pending_approval')
    .then(({ count }) => {
      if (count && count > 0) {
        badge.textContent = count;
        badge.style.display = 'inline-block';
        const drBadge = document.getElementById('dr-pending-badge');
        if (drBadge) { drBadge.textContent = count; drBadge.style.display = 'inline-block'; }
      } else {
        badge.style.display = 'none';
        const drBadge = document.getElementById('dr-pending-badge');
        if (drBadge) drBadge.style.display = 'none';
      }
    });
}

async function renderPending() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div> 読み込み中...</div>';

  const { data: pendingTasks, error } = await sb
    .from('tasks')
    .select('*, staff:staff_id(name, color)')
    .eq('source', 'voice')
    .eq('status', 'pending_approval')
    .order('created_at', { ascending: false });

  if (error) {
    content.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><p>読み込みに失敗しました</p></div>';
    return;
  }

  if (!pendingTasks || pendingTasks.length === 0) {
    content.innerHTML = `
      <div class="empty" style="padding:80px 20px;">
        <div class="empty-icon">🎙️</div>
        <p style="font-size:15px;color:var(--muted2);margin-bottom:8px;">現在タスク候補はありません</p>
        <p style="font-size:13px;color:var(--muted);">録音から自動抽出されます</p>
      </div>`;
    return;
  }

  const cards = pendingTasks.map(t => {
    const staffName = t.staff?.name || '未設定';
    const staffColor = t.staff?.color || 'var(--muted)';
    const createdDate = t.created_at ? formatDate(t.created_at) : '';
    const desc = t.description ? `<div style="font-size:12px;color:var(--muted2);line-height:1.7;margin:10px 0;padding:10px 12px;background:rgba(255,255,255,0.03);border-left:2px solid rgba(232,197,71,0.3);border-radius:0 6px 6px 0;">${t.description}</div>` : '';
    return `
      <div class="stat-card" style="margin-bottom:12px;border-color:rgba(232,197,71,0.2);">
        <div style="display:flex;align-items:flex-start;gap:12px;margin-bottom:6px;">
          <span style="font-size:20px;flex-shrink:0;">🎙️</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:15px;font-weight:700;margin-bottom:4px;">${t.title}</div>
            <div style="display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);">
              <span style="display:flex;align-items:center;gap:5px;">
                <span style="width:7px;height:7px;border-radius:50%;background:${staffColor};display:inline-block;"></span>
                ${staffName}
              </span>
              ${createdDate ? `<span>📅 ${createdDate}</span>` : ''}
              <span style="background:rgba(232,197,71,0.15);color:var(--gold);border-radius:10px;padding:1px 8px;font-weight:600;">音声抽出</span>
            </div>
          </div>
        </div>
        ${desc}
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn" style="background:rgba(71,232,160,0.15);color:var(--green);border:1px solid rgba(71,232,160,0.4);flex:1;"
            onclick="approvePending('${t.id}')">✅ 承認</button>
          <button class="btn" style="background:rgba(232,112,71,0.12);color:var(--orange);border:1px solid rgba(232,112,71,0.35);flex:1;"
            onclick="rejectPending('${t.id}')">🗑️ 却下</button>
        </div>
      </div>`;
  }).join('');

  content.innerHTML = `
    <div style="margin-bottom:20px;display:flex;align-items:center;gap:10px;">
      <div style="font-size:12px;color:var(--muted);">
        <span style="color:var(--gold);font-weight:700;">${pendingTasks.length}</span> 件の候補があります
      </div>
    </div>
    ${cards}`;
}

async function approvePending(taskId) {
  const { error } = await sb.from('tasks').update({ status: 'todo' }).eq('id', taskId);
  if (error) { showToast('承認に失敗しました', 'error'); return; }
  showToast('タスクを承認しました ✅', 'success');
  await loadAll();
  if (currentView === 'pending') renderPending();
}

async function rejectPending(taskId) {
  const { error } = await sb.from('tasks').update({ status: 'rejected' }).eq('id', taskId);
  if (error) { showToast('却下に失敗しました', 'error'); return; }
  showToast('タスクを却下しました', 'success');
  await loadAll();
  if (currentView === 'pending') renderPending();
}

// ── FLATPICKR ──
let duePicker;
function initDatePicker() {
  if (duePicker) duePicker.destroy();
  duePicker = flatpickr('#f-due', {
    locale: 'ja',
    dateFormat: 'Y-m-d',
    altInput: true,
    altFormat: 'Y年m月d日',
    minDate: 'today',
    disableMobile: false,
    onChange: function() {
      document.querySelectorAll('#due-shortcuts .filter-btn').forEach(b => b.classList.remove('active'));
    }
  });
}

loadAll();
initDatePicker();

// ── MOBILE MODE ──
function toggleMobileMode() {
  const isMobile = document.body.classList.toggle('mobile-mode');
  localStorage.setItem('mobileMode', isMobile ? '1' : '0');
  updateMobileToggleBtn();
}
function updateMobileToggleBtn() {
  const btn = document.getElementById('mobile-toggle-btn');
  if (!btn) return;
  const isMobile = document.body.classList.contains('mobile-mode');
  btn.textContent = isMobile ? '🖥️ PC表示' : '📱 モバイル表示';
}

// 初期化：localStorageまたは画面幅でモバイルモードを決定
(function initMobileMode() {
  const savedMode = localStorage.getItem('mobileMode');
  const isSmallScreen = window.innerWidth <= 768;
  if (savedMode === '1' || (savedMode === null && isSmallScreen)) {
    document.body.classList.add('mobile-mode');
  }
  updateMobileToggleBtn();
})();

// ── DRAWER ──
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  renderDrawerStaffNav();
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
}
function renderDrawerStaffNav() {
  const el = document.getElementById('drawer-staff-nav');
  if (!el) return;
  el.innerHTML = allStaff.map(s => {
    const cnt = allTasks.filter(t => t.staff_id === s.id && t.status !== 'done').length;
    const avatarSrc = STAFF_AVATARS[s.id];
    return `<div class="drawer-item" onclick="filterByStaff('${s.id}'); closeDrawer();">
      ${avatarSrc
        ? `<img src="${avatarSrc}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;flex-shrink:0;" />`
        : `<div style="width:22px;height:22px;border-radius:50%;background:${s.color}20;color:${s.color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">${s.name.charAt(0)}</div>`}
      <span style="flex:1;">${s.name}</span>
      ${cnt > 0 ? `<span style="font-size:11px;color:var(--muted);">${cnt}</span>` : ''}
    </div>`;
  }).join('');
}
</script>
